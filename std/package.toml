[workspace]
discover = true

# Auto-discovery (B-011): the bootstrap walks `lib/<...>/package.toml`
# to enumerate workspace members. The filesystem is the single source
# of truth; no hardcoded `members = [...]` list to drift against
# reality as packages are added.
#
# This implies / supersedes `[structmap] descendant_tree = true` (B-006):
# the root `index.toon` is emitted in full-descendant-tree form so any
# agent walking the chain reads one file and has, by definition, every
# piece of information they could obtain by any other walk.
#
# Blocked on upstream B-011 (see reference_upstream_bugs.md in the
# edda-native project memory). Until that lands, `edda build` from this
# directory rejects the manifest with an unknown-key diagnostic. We
# ship the V1.0-correct shape per `feedback_no_workarounds_in_edda_code.md`
# rather than hardcode 90 package paths that drift as the stdlib grows.
