[package]
name = "website"
version = "0.1.0"
root_namespace = "website"
license = "MIT OR Apache-2.0"

[[dependencies]]
name = "hermod"
version = "0.7.0"
source = "path+../../../runes/lib/hermod"

[[dependencies]]
name = "httpserver"
version = "0.1.0"
source = "path+../../../runes/lib/httpserver"

[[dependencies]]
name = "css"
version = "0.1.0"
source = "path+../../../runes/lib/css"

[[dependencies]]
name = "html"
version = "0.1.0"
source = "path+../../../runes/lib/html"

[[dependencies]]
name = "textbuilder"
version = "0.1.0"
source = "path+../../../runes/lib/textbuilder"

[[dependencies]]
name = "uri"
version = "0.1.0"
source = "path+../../../runes/lib/uri"

[build]
default_target = "x86-64-windows-msvc"
